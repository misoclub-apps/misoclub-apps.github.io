<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="友達画面のスクショ（仮画像）">
  <!-- 仮画像です。実際のスクリーンショットに差し替えてください。
       この枠は 4:3 で切り抜き表示されます（縦長スクショを入れると上部だけが見えます）。
       縦長スクショをそのまま使う場合は css/style.css の .lp-feature-shot の aspect-ratio を調整してください。 -->
  <rect x="4" y="4" width="632" height="472" rx="14" fill="#fff3e6" stroke="#e8915b" stroke-width="3" stroke-dasharray="12 10"/>
  <g fill="none" stroke="#c9743f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="270" y="130" width="100" height="80" rx="10"/>
    <circle cx="297" cy="155" r="9" fill="#c9743f" stroke="none"/>
    <path d="M275 200 L310 165 L335 190 L350 175 L365 200"/>
  </g>
  <text x="320" y="280" text-anchor="middle" font-family="-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="26" font-weight="700" fill="#c9743f">友達画面のスクショ</text>
  <text x="320" y="316" text-anchor="middle" font-family="-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="17" fill="#a97a56">仮画像・差し替え用</text>
  <text x="320" y="344" text-anchor="middle" font-family="-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif" font-size="15" fill="#a97a56">推奨: 実機スクショ（4:3 で切り抜き表示）</text>
</svg>
