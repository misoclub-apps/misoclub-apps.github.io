  <rect x="4" y="4" width="382" height="836" rx="36" fill="#fff3e6" stroke="#e8915b" stroke-width="3" stroke-dasharray="12 10"/>
  <g fill="none" stroke="#c9743f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="145" y="330" width="100" height="80" rx="10"/>
    <circle cx="172" cy="355" r="9" fill="#c9743f" stroke="none"/>
    <path d="M150 400 L185 365 L210 390 L225 375 L240 400"/>
